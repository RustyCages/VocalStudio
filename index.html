<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Pitch Matcher - Modern Version</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 16px; max-width: 800px; margin: auto; }
        canvas { background: #000; width: 100%; height: 300px; border-radius: 8px; margin-top: 20px; border: 1px solid #333; }
        button { background: #3d5afe; color: white; border: none; padding: 15px 30px; margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; }
        .hz-display { font-size: 1.5rem; margin: 20px; font-family: monospace; }
        #status { color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Vocal Pitch Matcher</h1>
    <div id="status">Klicka på knapparna för att starta</div>
    
    <div class="btn-group">
        <button id="btnTab">1. Koppla Flik (med ljud)</button>
        <button id="btnMic" disabled>2. Starta Mikrofon</button>
    </div>

    <div class="hz-display">
        Flik: <span id="tabHz" style="color: #4db8ff;">0</span> Hz | 
        Du: <span id="micHz" style="color: #00c853;">0</span> Hz
    </div>
    
    <canvas id="visualizer"></canvas>
</div>

<script type="module">
    // Vi använder Pitchy via en pålitlig ESM-källa
    import { PitchDetector } from "https://esm.sh/pitchy@4.0.1";

    let audioCtx;
    let tabData = { freq: 0, analyser: null, buffer: null, detector: null };
    let micData = { freq: 0, analyser: null, buffer: null, detector: null };

    const btnTab = document.getElementById('btnTab');
    const btnMic = document.getElementById('btnMic');
    const statusEl = document.getElementById('status');

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    function createDetectionNode(stream) {
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);
        
        return {
            analyser: analyser,
            buffer: new Float32Array(analyser.fftSize),
            detector: PitchDetector.forFloat32Array(analyser.fftSize)
        };
    }

    btnTab.onclick = async () => {
        try {
            await initAudio();
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true, 
                audio: true 
            });

            if (stream.getAudioTracks().length === 0) {
                alert("DU MÅSTE BOCKA I 'DELA LJUD'!");
                return;
            }

            tabData = { ...tabData, ...createDetectionNode(stream) };
            btnMic.disabled = false;
            statusEl.innerText = "Flik kopplad! Starta micken.";
            updateLoop(); // Starta analysen
        } catch (e) {
            statusEl.innerText = "Fel: " + e.message;
        }
    };

    btnMic.onclick = async () => {
        try {
            await initAudio();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micData = { ...micData, ...createDetectionNode(stream) };
            statusEl.innerText = "Sjung nu!";
            draw(); // Starta ritandet
        } catch (e) {
            statusEl.innerText = "Kunde inte starta mick.";
        }
    };

    function updateLoop() {
        // Analysera fliken
        if (tabData.analyser) {
            tabData.analyser.getFloatTimeDomainData(tabData.buffer);
            const [pitch, clarity] = tabData.detector.findPitch(tabData.buffer, audioCtx.sampleRate);
            if (clarity > 0.8) {
                tabData.freq = pitch;
                document.getElementById('tabHz').innerText = Math.round(pitch);
            }
        }

        // Analysera micken
        if (micData.analyser) {
            micData.analyser.getFloatTimeDomainData(micData.buffer);
            const [pitch, clarity] = micData.detector.findPitch(micData.buffer, audioCtx.sampleRate);
            if (clarity > 0.8) {
                micData.freq = pitch;
                document.getElementById('micHz').innerText = Math.round(pitch);
            }
        }

        requestAnimationFrame(updateLoop);
    }

    function draw() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const getY = (f) => {
            if (f < 50 || f > 1000) return -100;
            return canvas.height - (Math.log2(f/50) / Math.log2(1000/50)) * canvas.height;
        };

        // Rita flik (Blå linje)
        const ty = getY(tabData.freq);
        if (ty > 0) {
            ctx.strokeStyle = "#4db8ff";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, ty); ctx.lineTo(canvas.width, ty); ctx.stroke();
        }

        // Rita röst (Grön boll)
        const my = getY(micData.freq);
        if (my > 0) {
            ctx.fillStyle = "#00c853";
            ctx.beginPath(); ctx.arc(canvas.width/2, my, 15, 0, Math.PI*2); ctx.fill();
        }

        requestAnimationFrame(draw);
    }
</script>
</body>
</html>
