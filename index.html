<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Pitch Matcher - Fixed</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; }
        canvas { background: #000; width: 100%; height: 300px; border-radius: 8px; margin-top: 20px; }
        button { background: #3d5afe; color: white; border: none; padding: 15px 30px; margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; }
        #status { color: #aaa; margin: 10px; font-family: monospace; }
        .hz-display { font-size: 1.2rem; margin: 10px; color: #4db8ff; }
    </style>
</head>
<body>

<div class="card">
    <h1>Vocal Pitch Matcher</h1>
    <div id="status">Laddar bibliotek...</div>
    
    <div class="btn-group">
        <button id="btnTab" disabled>1. Koppla Flik</button>
        <button id="btnMic" disabled>2. Starta Mikrofon</button>
    </div>

    <div class="hz-display">
        Flik: <span id="tabHz">0</span> Hz | Du: <span id="micHz">0</span> Hz
    </div>
    
    <canvas id="visualizer"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/aubiojs@0.1.1/build/aubio.min.js"></script>

<script>
    let audioCtx;
    let tabFreq = 0, micFreq = 0;
    let AubioInstance;

    const statusEl = document.getElementById('status');
    const btnTab = document.getElementById('btnTab');
    const btnMic = document.getElementById('btnMic');

    // 1. KONTROLLERA ATT BIBLIOTEKET LADDATS
    window.onload = async () => {
        try {
            // AubioJS skapar ofta en global funktion som heter 'aubio'
            if (typeof window.aubio !== 'function') {
                throw new Error("AubioJS hittades inte. Kontrollera internetanslutning.");
            }
            
            statusEl.innerText = "Bibliotek redo. Klicka på 'Koppla Flik'.";
            btnTab.disabled = false;
        } catch (e) {
            statusEl.innerText = "FEL: " + e.message;
            console.error(e);
        }
    };

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        if (!AubioInstance) {
            AubioInstance = await window.aubio();
        }
    }

    btnTab.onclick = async () => {
        await initAudio();
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            if (stream.getAudioTracks().length === 0) {
                alert("Du måste bocka i 'Dela ljud'!");
                return;
            }
            startPitchDetection(stream, 'tab');
            btnMic.disabled = false;
            statusEl.innerText = "Flik kopplad. Starta mikrofonen.";
        } catch (e) {
            statusEl.innerText = "Kunde inte koppla flik.";
        }
    };

    btnMic.onclick = async () => {
        await initAudio();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            startPitchDetection(stream, 'mic');
            statusEl.innerText = "Sjung!";
            draw();
        } catch (e) {
            statusEl.innerText = "Kunde inte starta mikrofon.";
        }
    };

    function startPitchDetection(stream, type) {
        const source = audioCtx.createMediaStreamSource(stream);
        const pitchDetector = new AubioInstance.Pitch('default', 2048, 512, audioCtx.sampleRate);
        
        const scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);
        source.connect(scriptNode);
        scriptNode.connect(audioCtx.destination);

        scriptNode.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const freq = pitchDetector.do(input);
            if (type === 'tab') {
                tabFreq = freq;
                document.getElementById('tabHz').innerText = Math.round(freq);
            } else {
                micFreq = freq;
                document.getElementById('micHz').innerText = Math.round(freq);
            }
        };
    }

    function draw() {
        requestAnimationFrame(draw);
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const getY = (f) => {
            if (f < 40) return -100;
            return canvas.height - (Math.log2(f/40) / Math.log2(1000/40)) * canvas.height;
        };

        const ty = getY(tabFreq);
        const my = getY(micFreq);

        if (ty > 0) {
            ctx.strokeStyle = "#4db8ff";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, ty); ctx.lineTo(canvas.width, ty); ctx.stroke();
        }
        if (my > 0) {
            ctx.fillStyle = "#ff5532";
            ctx.beginPath(); ctx.arc(canvas.width/2, my, 12, 0, Math.PI*2); ctx.fill();
        }
    }
</script>

</body>
</html>
