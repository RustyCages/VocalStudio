<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Matcher Pro</title>
    <style>
        body { 
            background: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
        }
        .card { 
            background: #1e1e1e; 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
            width: 100%; 
            max-width: 900px; 
            text-align: center; 
        }
        canvas { 
            background: #000; 
            width: 100%; 
            height: 350px; 
            border-radius: 8px; 
            margin-top: 20px; 
            border: 1px solid #333; 
        }
        .btn-group { margin: 20px 0; }
        button { 
            background: #3d5afe; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            margin: 5px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s;
        }
        button:hover { background: #536dfe; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }
        #btnMic { background: #00c853; }
        #btnMic:hover { background: #69f0ae; }
        
        .status-bar { 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 4px; 
            background: #2a2a2a;
            font-family: monospace;
        }
        .match-alert { color: #00c853; font-weight: bold; height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Pitch Matcher</h1>
    <p>Fånga ljudet från en flik och se om du kan sjunga i samma tonläge!</p>
    
    <div class="btn-group">
        <button id="btnTab">1. Koppla Flik (inkl. Ljud)</button>
        <button id="btnMic" disabled>2. Starta Mikrofon</button>
    </div>
    
    <div class="status-bar" id="status">Väntar på val av källa...</div>
    <div id="matchText" class="match-alert"></div>
    
    <div id="debug" style="font-size: 0.8rem; color: #888;">
        Flik: <span id="tabHz">0</span> Hz | Du: <span id="micHz">0</span> Hz
    </div>
    
    <canvas id="visualizer"></canvas>
</div>

<script src="https://unpkg.com/aubiojs@0.1.1/build/aubio.min.js"></script>

<script>
    let audioCtx;
    let tabFreq = 0;
    let micFreq = 0;
    let isRunning = false;

    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const matchText = document.getElementById('matchText');

    // Hjälpfunktion för att starta AudioContext (måste ske via klick)
    async function ensureAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
    }

    // Hantera Flik-delning
    document.getElementById('btnTab').onclick = async () => {
        try {
            await ensureAudioContext();
            // VIKTIGT: Användaren MÅSTE kryssa i "Dela ljud" i popup-rutan!
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true, 
                audio: true 
            });
            
            if (stream.getAudioTracks().length === 0) {
                alert("Du glömde att kryssa i 'Dela ljud'!");
                return;
            }

            setupPitch(stream, 'tab');
            statusEl.innerText = "Flik kopplad! Starta nu mikrofonen.";
            document.getElementById('btnMic').disabled = false;
        } catch (err) {
            console.error(err);
            statusEl.innerText = "Fel vid flikdelning: " + err.message;
        }
    };

    // Hantera Mikrofon
    document.getElementById('btnMic').onclick = async () => {
        try {
            await ensureAudioContext();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            setupPitch(stream, 'mic');
            statusEl.innerText = "Sjung nu!";
            if (!isRunning) {
                isRunning = true;
                draw();
            }
        } catch (err) {
            statusEl.innerText = "Kunde inte nå mikrofonen.";
        }
    };

    async function setupPitch(stream, type) {
        const source = audioCtx.createMediaStreamSource(stream);
        
        // Vänta på att aubio laddats
        const AubioModule = await window.aubio();
        const pitchDetector = new AubioModule.Pitch(
            'default', 
            2048, 
            2048 / 4, 
            audioCtx.sampleRate
        );

        const scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);
        source.connect(scriptNode);
        scriptNode.connect(audioCtx.destination);

        scriptNode.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            const freq = pitchDetector.do(input);
            
            if (type === 'tab') {
                tabFreq = freq;
                document.getElementById('tabHz').innerText = Math.round(freq);
            } else {
                micFreq = freq;
                document.getElementById('micHz').innerText = Math.round(freq);
            }
        };
    }

    function draw() {
        requestAnimationFrame(draw);
        
        // Rensa skärmen
        ctx.fillStyle = "#121212";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Rita stödlinjer för frekvens
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
            let y = (canvas.height / 10) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Skala om frekvens till Y-position (fokus på 80Hz - 800Hz)
        const getPlayerY = (f) => {
            if (f <= 0) return -100;
            const logF = Math.log2(f);
            const minF = Math.log2(80);
            const maxF = Math.log2(800);
            return canvas.height - ((logF - minF) / (maxF - minF)) * canvas.height;
        };

        const tabY = getPlayerY(tabFreq);
        const micY = getPlayerY(micFreq);

        // Rita målet (Fliken) - Blått ljus
        if (tabY > 0) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#3d5afe";
            ctx.strokeStyle = "#3d5afe";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, tabY);
            ctx.lineTo(canvas.width, tabY);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Rita spelaren (Du) - Grön boll
        if (micY > 0) {
            ctx.fillStyle = "#00c853";
            ctx.beginPath();
            ctx.arc(canvas.width / 2, micY, 20, 0, Math.PI * 2);
            ctx.fill();

            // Kolla match (inom ett litet spann)
            const diff = Math.abs(tabFreq - micFreq);
            if (tabFreq > 0 && diff < 10) {
                matchText.innerText = "PERFEKT MATCH!";
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.stroke();
            } else {
                matchText.innerText = "";
            }
        }
    }
</script>

</body>
</html>
